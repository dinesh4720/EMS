name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Allow this workflow to be invoked as the pre-deploy test gate by deploy.yml
  # (`uses: ./.github/workflows/ci.yml`). Without workflow_call the reusable-workflow
  # call is rejected at parse time and every Deploy Frontend run fails.
  workflow_call:
    inputs:
      skip_badges:
        description: >-
          Set true when invoked as the deploy gate. The standalone push/PR run
          already pushes coverage badges; running the badge push again from the
          deploy gate races it and fails on a non-fast-forward push.
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: school-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: .
        env:
          # Skip browser downloads during CI install. Puppeteer (dev-only,
          # used by Lighthouse-style scripts) and Playwright (only used in
          # tests, never at runtime) both postinstall-download their
          # browsers; that download fails on the GitHub Actions runner and
          # used to brick the whole install. CI never runs the browser,
          # so skipping the download is safe and keeps install fast + green.
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Build
        run: npm run build

  lint-dashboard:
    name: Lint Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: school-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: .
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Lint
        run: npm run lint

  unit-tests-dashboard:
    name: Dashboard Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: school-dashboard
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: .
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: school-dashboard/coverage/
          if-no-files-found: error

      - name: Generate coverage badges
        # Skip when this run is the deploy.yml pre-deploy gate (see skip_badges
        # input) — the standalone push/PR CI run owns the badge push.
        if: ${{ !inputs.skip_badges }}
        uses: jpb06/coverage-badges-action@latest
        with:
          coverage-summary-path: ./school-dashboard/coverage/coverage-summary.json
          output-folder: ./school-dashboard/badges

  playwright-compile:
    name: Playwright Test Compilation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: school-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: .
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: List Playwright tests (compile check)
        run: npx playwright test --list

  build-parent-app:
    name: Build Parent App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Build parent app (web)
        run: npm run build:web -w parent-app
        env:
          # Build-time placeholder so the web compile check passes; the real
          # URLs are injected at deploy time by Render (see render.yaml,
          # EXPO_PUBLIC_* with sync:false). app.config.js requires these since
          # the hardcoded-localhost fallback was removed (DK-877).
          EXPO_PUBLIC_API_BASE_URL: https://api.example.com
          EXPO_PUBLIC_SOCKET_URL: wss://api.example.com

  build-staff-app:
    name: Build Staff App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Build staff app (web)
        run: npm run build:web -w staff-app
        env:
          # Build-time placeholder so the web compile check passes; the real
          # URLs are injected at deploy time by Render (see render.yaml,
          # EXPO_PUBLIC_* with sync:false). app.config.js requires these since
          # the hardcoded-localhost fallback was removed (DK-877).
          EXPO_PUBLIC_API_BASE_URL: https://api.example.com
          EXPO_PUBLIC_SOCKET_URL: wss://api.example.com

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Disabled until GitHub Advanced Security / Dependency graph is enabled for
    # the repository, otherwise the action fails with "Dependency review is not
    # supported on this repository". Re-enable via repo settings:
    # https://github.com/dinesh4720/EMS/settings/security_analysis
    if: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
