services:
  - type: static
    name: school-dashboard
    rootDir: school-dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: school-dashboard/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
      - key: VITE_APP_VERSION
        sync: false
      - key: VITE_SCHOOL_NAME
        sync: false
      - key: VITE_SCHOOL_ADDRESS
        sync: false
      - key: VITE_SCHOOL_CONTACT
        sync: false
      - key: VITE_SCHOOL_GSTIN
        sync: false
      - key: VITE_OWLIN_ENDPOINT
        sync: false
      - key: VITE_GA_MEASUREMENT_ID
        sync: false
      - key: VITE_MIXPANEL_TOKEN
        sync: false
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_LOG_LEVEL
        sync: false

  - type: static
    name: parent-app-web
    rootDir: parent-app
    buildCommand: npm install && npm run build:web
    staticPublishPath: parent-app/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: EXPO_PUBLIC_API_BASE_URL
        sync: false
      - key: EXPO_PUBLIC_SOCKET_URL
        sync: false
      - key: APP_ENV
        value: production

  - type: static
    name: staff-app-web
    rootDir: staff-app
    buildCommand: npm install && npm run build:web
    staticPublishPath: staff-app/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: EXPO_PUBLIC_API_BASE_URL
        sync: false
      - key: EXPO_PUBLIC_SOCKET_URL
        sync: false
      - key: APP_ENV
        value: production
